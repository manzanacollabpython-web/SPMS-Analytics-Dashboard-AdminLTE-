<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FINAL BOSS DASHBOARD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  height:100vh;
  overflow:hidden;
}

.container{
  height:100vh;
  display:grid;
  grid-template-rows: auto auto 1fr 1fr;
  gap:10px;
  padding:10px;
}

/* TITLE */
.title{
  text-align:center;
  font-size:28px;
  font-weight:bold;
  letter-spacing:2px;
}

/* BOXES */
.row{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
}

.box{
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  padding:15px;
  text-align:center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.big{
  font-size:32px;
  font-weight:bold;
}

/* PANELS */
.middle{
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:10px;
}

.bottom{
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

.panel{
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  padding:10px;
  backdrop-filter: blur(10px);
}

/* FIX SA CUT CHART */
canvas{
  width:100% !important;
  height:100% !important;
}

.panel canvas{
  max-height:100%;
}

/* IMPORTANT FIX */
.panel{
  display:flex;
  flex-direction:column;
}

.panel h4{
  margin:5px;
}

.chart{
  flex:1;
  position:relative;
}
</style>
</head>

<body style="display:none;">

<div class="container">

<div class="title">Q1 COMPLIANCE DASHBOARD</div>

<!-- KPI -->
<div class="row">
  <div class="box"><div>Total KPI</div><div class="big" id="total">0</div></div>
  <div class="box"><div>On-Time</div><div class="big" id="ontime">0%</div></div>
  <div class="box"><div>Late</div><div class="big" id="late">0%</div></div>
  <div class="box"><div>Not Submitted</div><div class="big" id="notsubmitted">0%</div></div>
</div>

<!-- MIDDLE -->
<div class="middle">

  <div class="panel">
    <h4>Performance</h4>
    <div class="chart">
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <div class="panel">
    <h4>Status</h4>
    <div class="chart">
      <canvas id="pieChart"></canvas>
    </div>
  </div>

</div>

<!-- BOTTOM -->
<div class="bottom">

  <div class="panel">
    <h4>Category</h4>
    <div class="chart">
      <canvas id="pie1"></canvas>
    </div>
  </div>

  <div class="panel">
    <h4>Reported</h4>
    <div class="chart">
      <canvas id="pie2"></canvas>
    </div>
  </div>

  <div class="panel">
    <h4>Compliance</h4>
    <div class="chart">
      <canvas id="pie3"></canvas>
    </div>
  </div>

</div>

</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtsHSDvB8iC3RSfJRmKf3MOkVb3LKkZ98aTxik3vDeOINaEFQW-4l_vTetjU05LszMK7cytmBq-i6n/pub?gid=959972291&single=true&output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(csv => {

const rows = csv.trim().split("\n").map(r => r.split(","));
const headers = rows[0];

const data = rows.slice(1).map(row => {
  let obj = {};
  headers.forEach((h,i)=> obj[h.trim()] = row[i]);
  return obj;
});

let total = data.length;
let ontime = 0, late = 0, notsubmitted = 0;

let labels = [];
let values = [];

data.forEach(row=>{
let perf = parseFloat(row["PERFORMANCE RATE"]) || 0;
let status = (row["STATUS"]||"").toLowerCase();

labels.push(row["INDICATOR"]);
values.push(perf);

if(status.includes("on")) ontime++;
else if(status.includes("late")) late++;
else notsubmitted++;
});

// KPI
document.getElementById("total").innerText = total;
document.getElementById("ontime").innerText = ((ontime/total)*100).toFixed(1)+"%";
document.getElementById("late").innerText = ((late/total)*100).toFixed(1)+"%";
document.getElementById("notsubmitted").innerText = ((notsubmitted/total)*100).toFixed(1)+"%";

// BAR
new Chart(document.getElementById("barChart"),{
type:'bar',
data:{
labels:labels,
datasets:[{
data:values,
backgroundColor:'#4fc3f7'
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

// PIE
new Chart(document.getElementById("pieChart"),{
type:'pie',
data:{
labels:['On-Time','Late','Not Submitted'],
datasets:[{
data:[ontime,late,notsubmitted],
backgroundColor:['#00e676','#ff9800','#ff5252']
}]
}
});

// SHOW
document.body.style.display = "block";

})
.catch(err=>{
console.error(err);
alert("❌ Error loading data");
});
</script>

</body>
</html>
