<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q1 Compliance Dashboard</title>

<!-- AdminLTE + Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f3b44;
  color:white;
  overflow:hidden;
}

.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:10px;
}

h1{
  text-align:center;
  margin:5px;
}

.row{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.box{
  flex:1;
  background:#1b5a63;
  border-radius:10px;
  padding:10px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.2);
}

.big{
  font-size:35px;
  font-weight:bold;
}

.middle{
  display:flex;
  gap:10px;
  flex:1;
}

.panel{
  flex:1;
  background:#1b5a63;
  border-radius:10px;
  padding:10px;
}

.bottom{
  display:flex;
  gap:10px;
  flex:1;
}

canvas{
  height:100% !important;
}
</style>
</head>

<body style="display:none;">

<div class="container">

<h1>Q1 COMPLIANCE DASHBOARD</h1>

<!-- TOP -->
<div class="row">
  <div class="box">
    <div>Average</div>
    <div class="big" id="avg">0%</div>
  </div>
  <div class="box">
    <div>Overall</div>
    <div class="big" id="overall">0%</div>
  </div>
</div>

<!-- KPI -->
<div class="row">
  <div class="box"><div>Total KPI</div><div class="big" id="total">0</div></div>
  <div class="box"><div>On-Time</div><div class="big" id="ontime">0%</div></div>
  <div class="box"><div>Late</div><div class="big" id="late">0%</div></div>
  <div class="box"><div>Not Submitted</div><div class="big" id="notsubmitted">0%</div></div>
</div>

<!-- MIDDLE -->
<div class="middle">
  <div class="panel">
    <h4>Performance</h4>
    <canvas id="barChart"></canvas>
  </div>

  <div class="panel">
    <h4>Status</h4>
    <canvas id="pieChart"></canvas>
  </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <div class="panel">
    <h4>Category</h4>
    <canvas id="pie1"></canvas>
  </div>

  <div class="panel">
    <h4>Reported</h4>
    <canvas id="pie2"></canvas>
  </div>

  <div class="panel">
    <h4>Compliance</h4>
    <canvas id="pie3"></canvas>
  </div>
</div>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// 🔥 PALITAN MO ITO
const sheetURL = "https://opensheet.elk.sh/1onyRaQHBKc7aioKII4UPYiDTWgbliAlvGywk9ceNf_4/Sheet1";

fetch(sheetURL)
.then(res => res.json())
.then(data => {

let total = data.length;
let ontime = 0, late = 0, notsubmitted = 0;
let sum = 0;

let labels = [];
let values = [];

data.forEach(row=>{
let perf = parseFloat(row["PERFORMANCE RATE"]) || 0;
let status = (row["STATUS"]||"").toLowerCase();

sum += perf;
labels.push(row["INDICATOR"]);
values.push(perf);

if(status.includes("on")) ontime++;
else if(status.includes("late")) late++;
else notsubmitted++;
});

let avg = (sum/total).toFixed(2);

// display
document.getElementById("total").innerText = total;
document.getElementById("avg").innerText = avg+"%";
document.getElementById("overall").innerText = avg+"%";

document.getElementById("ontime").innerText = ((ontime/total)*100).toFixed(1)+"%";
document.getElementById("late").innerText = ((late/total)*100).toFixed(1)+"%";
document.getElementById("notsubmitted").innerText = ((notsubmitted/total)*100).toFixed(1)+"%";

// BAR
new Chart(barChart,{
type:'bar',
data:{
labels:labels,
datasets:[{data:values,backgroundColor:'#6ec1e4'}]
}
});

// PIE STATUS
new Chart(pieChart,{
type:'pie',
data:{
labels:['On-Time','Late','Not Submitted'],
datasets:[{
data:[ontime,late,notsubmitted],
backgroundColor:['green','orange','red']
}]
}
});

// EXTRA PIE
new Chart(pie1,{
type:'pie',
data:{labels:['A','B'],datasets:[{data:[60,40]}]}
});

new Chart(pie2,{
type:'pie',
data:{labels:['Reported','Not'],datasets:[{data:[80,20]}]}
});

new Chart(pie3,{
type:'pie',
data:{labels:['Good','Bad'],datasets:[{data:[70,30]}]}
});

// SHOW PAGE
document.body.style.display = "block";

});
</script>

</body>
</html>
