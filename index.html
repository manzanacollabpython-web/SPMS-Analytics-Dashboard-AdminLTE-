<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPMS Dashboard Q1</title>

<!-- AdminLTE + Fonts -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,700">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

<style>
body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  overflow:hidden;
}

.content-wrapper{
  background: transparent;
}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:15px;
}

.small-box{
  border-radius:15px;
}

h1{
  font-weight:bold;
  text-align:center;
  margin-bottom:20px;
}

.chart-container{
  height:250px !important;
}
</style>
</head>

<body class="hold-transition layout-top-nav">

<div class="wrapper">

<div class="content-wrapper">
<div class="content pt-3">

<div class="container-fluid">

<h1>Q1 COMPLIANCE DASHBOARD</h1>

<!-- KPI ROW -->
<div class="row">

<div class="col-md-3">
<div class="small-box bg-info">
<div class="inner">
<h3 id="total">0</h3>
<p>Total KPI</p>
</div>
<div class="icon"><i class="fas fa-list"></i></div>
</div>
</div>

<div class="col-md-3">
<div class="small-box bg-success">
<div class="inner">
<h3 id="ontime">0%</h3>
<p>On-Time</p>
</div>
<div class="icon"><i class="fas fa-check"></i></div>
</div>
</div>

<div class="col-md-3">
<div class="small-box bg-warning">
<div class="inner">
<h3 id="late">0%</h3>
<p>Late</p>
</div>
<div class="icon"><i class="fas fa-clock"></i></div>
</div>
</div>

<div class="col-md-3">
<div class="small-box bg-danger">
<div class="inner">
<h3 id="notsubmitted">0%</h3>
<p>Not Submitted</p>
</div>
<div class="icon"><i class="fas fa-times"></i></div>
</div>
</div>

</div>

<!-- CHARTS -->
<div class="row">

<div class="col-md-6">
<div class="card">
<div class="card-header">Performance by Indicator</div>
<div class="card-body">
<canvas id="barChart"></canvas>
</div>
</div>
</div>

<div class="col-md-6">
<div class="card">
<div class="card-header">Submission Status</div>
<div class="card-body">
<canvas id="pieChart"></canvas>
</div>
</div>
</div>

</div>

</div>
</div>
</div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// 🔥 PALITAN MO LANG ITO (GOOGLE SHEET JSON)
const sheetURL = "https://opensheet.elk.sh/YOUR_SHEET_ID/Sheet1";

fetch(sheetURL)
.then(res => res.json())
.then(data => {

let total = data.length;
let ontime = 0;
let late = 0;
let notsubmitted = 0;

let labels = [];
let performance = [];

data.forEach(row => {

let status = (row["STATUS"] || "").toLowerCase();
let perf = parseFloat(row["PERFORMANCE RATE"]) || 0;

labels.push(row["INDICATOR"]);
performance.push(perf);

// logic
if(status.includes("on")) ontime++;
else if(status.includes("late")) late++;
else notsubmitted++;

});

// percentages
let ontimeP = ((ontime/total)*100).toFixed(1);
let lateP = ((late/total)*100).toFixed(1);
let notP = ((notsubmitted/total)*100).toFixed(1);

// display
document.getElementById("total").innerText = total;
document.getElementById("ontime").innerText = ontimeP+"%";
document.getElementById("late").innerText = lateP+"%";
document.getElementById("notsubmitted").innerText = notP+"%";

// BAR CHART
new Chart(document.getElementById("barChart"),{
type:'bar',
data:{
labels:labels,
datasets:[{
label:'Performance %',
data:performance,
backgroundColor:'#00c0ef'
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

// PIE
new Chart(document.getElementById("pieChart"),{
type:'pie',
data:{
labels:['On-Time','Late','Not Submitted'],
datasets:[{
data:[ontime,late,notsubmitted],
backgroundColor:['#00a65a','#f39c12','#dd4b39']
}]
}
});

});

</script>

</body>
</html>
